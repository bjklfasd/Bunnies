<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    margin:0;
    background:#111;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    text-align:center;
}

img{
    width:200px;
    height: 200px;
    border-radius:12px;
    margin-bottom:20px;
}

button{
    padding:14px 40px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#6c4cff;
    color:#fff;
    cursor:pointer;
}

button:hover{
    background:#7d5fff;
}
</style>
</head>
<body>

<div class="card">
    <img src="roblox.png" alt="Game">
    <br>
    <button id="play">Play</button>
</div>

<script>
document.getElementById("play").onclick = () => {
    localStorage.setItem(
        "launchURL",
        "https://nowgg.fun/apps/a/19900/b.html"
    );

    // Open the proxy page
    window.location.href = "/active/";
};
</script>

</body>
</html>
